kind = "web"
previewPath = "/"
title = "PostureAI"
version = "1.0.0"
id = "artifacts/postureai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24993

[services.development]
run = "pnpm --filter @workspace/postureai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/postureai", "run", "build" ]
publicDir = "artifacts/postureai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24993"
BASE_PATH = "/"
